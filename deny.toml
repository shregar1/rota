# This template contains all of the possible sections and their default values

[graph]
targets = []
exclude = []
all-features = false
no-default-features = false
features = []

[output]
feature-depth = 1

[advisories]
db-path = ""
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []
git-fetch-with-cli = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = [
    { crate = "backtrace", reason = "unmaintained, use std::backtrace" },
    { crate = "atty", reason = "unmaintained, use is-terminal" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []